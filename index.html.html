        // Simpan embedding rujukan yang sudah dikira (dicache) di sini, supaya
        // tidak perlu download + infer gambar berulang kali setiap kali "Imbas" ditekan.
        let cacheRujukan = []; // { pokok, embedding }

        async function mulakanKamera() {
            try {
                const strim = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = strim;
                await video.play();
                statusTeks.textContent = "✅ Kamera sedia. Memuatkan sistem AI...";
                await muatkanModel();
            } catch (err) {
                console.error(err);
                statusTeks.textContent = "❌ Gagal buka kamera. Sila benarkan akses kamera dalam pelayar.";
            }
        }

        async function muatkanModel() {
            try {
                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                statusTeks.textContent = "📥 Memuat turun & menyediakan gambar rujukan (sekali sahaja)...";
                await sediakanCacheRujukan();
                statusTeks.textContent = "✅ Sistem sedia! Tekan Imbas untuk mula.";
                butangImbas.disabled = false;
            } catch (err) {
                console.error(err);
                statusTeks.textContent = "❌ Gagal muatkan sistem AI.";
            }
        }

        // Muatkan SEMUA gambar rujukan & kira embedding SEKALI SAHAJA semasa loading,
        // bukan setiap kali klik "Imbas". Ini yang buat scan jadi laju lepas ni.
        async function sediakanCacheRujukan() {
            const semuaTugas = [];
            let jumlahGambar = 0;
            senaraiPokok.forEach(p => jumlahGambar += p.gambarRujukan.length);
            let siap = 0;

            for (const pokok of senaraiPokok) {
                for (const urlGambar of pokok.gambarRujukan) {
                    semuaTugas.push((async () => {
                        try {
                            const imej = await muatGambar(urlGambar);
                            if (imej) {
                                // tf.tidy tak boleh guna dengan async, jadi kita dispose manual
                                const embedding = model.infer(imej, true);
                                // simpan salinan data (bukan tensor) supaya jimat memori GPU
                                const dataEmbedding = embedding.dataSync();
                                embedding.dispose();
                                cacheRujukan.push({ pokok, embedding: dataEmbedding });
                            } else {
                                console.warn("Gagal muat gambar rujukan (mungkin isu CORS/network):", urlGambar);
                            }
                        } catch (err) {
                            console.warn("Ralat proses gambar rujukan:", urlGambar, err);
                        } finally {
                            siap++;
                            const peratus = Math.round((siap / jumlahGambar) * 100);
                            progressWrap.style.display = "block";
                            progressBar.style.width = peratus + "%";
                            statusTeks.textContent = `📥 Menyediakan gambar rujukan... (${siap}/${jumlahGambar})`;
                        }
                    })());
                }
            }

            await Promise.all(semuaTugas);
            progressWrap.style.display = "none";

            if (cacheRujukan.length === 0) {
                statusTeks.textContent = "⚠️ Tiada gambar rujukan berjaya dimuat. Semak sambungan internet / CORS pada pelayan gambar.";
            }
        }

        function muatGambar(url) {
            return new Promise((resolve) => {
                const imej = new Image();
                imej.crossOrigin = "anonymous";
                imej.referrerPolicy = "no-referrer";
                const masaTamat = setTimeout(() => resolve(null), 10000); // jangan tunggu selama-lamanya
                imej.onload = () => { clearTimeout(masaTamat); resolve(imej); };
                imej.onerror = () => { clearTimeout(masaTamat); resolve(null); };
                imej.src = url;
            });
        }

        function jarakKosinus(a, b) {
            // a, b ialah Float32Array embedding. Kira cosine similarity secara manual (laju, tiada tensor overhead).
            let titik = 0, magA = 0, magB = 0;
            for (let i = 0; i < a.length; i++) {
                titik += a[i] * b[i];
                magA += a[i] * a[i];
                magB += b[i] * b[i];
            }
            const similarity = titik / (Math.sqrt(magA) * Math.sqrt(magB));
            return similarity; // -1 hingga 1, lagi tinggi lagi sama
        }

        async function mulakanPengecaman() {
            if (!model) return;
            if (cacheRujukan.length === 0) {
                statusTeks.textContent = "⚠️ Tiada gambar rujukan dalam cache. Tak boleh banding.";
                return;
            }

            statusTeks.textContent = "🔍 Sedang menganalisis...";
            maklumatKotak.style.display = "none";
            butangImbas.disabled = true;

            kanvas.width = video.videoWidth || 640;
            kanvas.height = video.videoHeight || 480;
            konteks.drawImage(video, 0, 0, kanvas.width, kanvas.height);

            const ciriTerimbasTensor = model.infer(kanvas, true);
            const ciriTerimbas = ciriTerimbasTensor.dataSync();
            ciriTerimbasTensor.dispose();

            let padananTerbaik = null;
            let skorTertinggi = -Infinity;

            for (const item of cacheRujukan) {
                const similarity = jarakKosinus(ciriTerimbas, item.embedding);
                const keyakinan = Math.round(similarity * 100);
                if (keyakinan > skorTertinggi) {
                    skorTertinggi = keyakinan;
                    padananTerbaik = item.pokok;
                }
            }

            if (padananTerbaik && skorTertinggi >= 40) {
                statusTeks.textContent = "✅ Dikenal pasti";
                namaPokok.textContent = padananTerbaik.nama;
                namaSaintifik.textContent = padananTerbaik.saintifik;
                keteranganPokok.textContent = padananTerbaik.keterangan;
                kegunaanPokok.textContent = padananTerbaik.inovasi.join(" | ");
                tahapPadanan.textContent = `${skorTertinggi}%`;
                maklumatKotak.style.display = "block";
            } else {
                statusTeks.textContent = `❌ Tak dapat kenal pasti (Padanan: ${skorTertinggi > -Infinity ? skorTertinggi : 0}%). Cuba lagi.`;
            }
            butangImbas.disabled = false;
        }

        butangImbas.addEventListener('click', mulakanPengecaman);
        window.addEventListener('load', mulakanKamera);
    </script>
</body>
